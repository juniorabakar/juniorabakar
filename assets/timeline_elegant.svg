<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" width="700" height="460">
  <defs>
    <style>
      .line { opacity: 0; animation: appear 0.1s ease forwards; }
      .dot { opacity: 0; animation: pop 0.3s ease forwards; }
      .cursor { animation: blink 1s step-end infinite; }

      .l01 { animation-delay: 0.3s; }
      .l02 { animation-delay: 0.8s; }
      .l03 { animation-delay: 1.3s; }
      .l04 { animation-delay: 1.8s; }
      .l05 { animation-delay: 2.5s; }
      .l06 { animation-delay: 3.0s; }
      .l07 { animation-delay: 3.5s; }
      .l08 { animation-delay: 4.2s; }
      .l09 { animation-delay: 4.7s; }
      .l10 { animation-delay: 5.2s; }
      .l11 { animation-delay: 6.0s; }
      .l12 { animation-delay: 6.5s; }
      .l13 { animation-delay: 7.0s; }
      .l14 { animation-delay: 7.8s; }

      @keyframes appear { to { opacity: 1; } }
      @keyframes pop {
        0% { opacity: 0; transform: scale(0.5); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>

    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#020812"/>
      <stop offset="100%" style="stop-color:#050e1f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="460" rx="10" fill="url(#bg2)" stroke="#1e2a3a" stroke-width="1.5"/>

  <!-- Vertical timeline line -->
  <line class="line l01" x1="80" y1="60" x2="80" y2="400" stroke="#1e3a5a" stroke-width="1.5"/>

  <!-- TITLE -->
  <g class="line l01">
    <text x="350" y="35" font-family="Georgia, serif" font-size="14" fill="#4a9eff" text-anchor="middle" letter-spacing="4" opacity="0.8">PARCOURS</text>
    <line x1="200" y1="42" x2="500" y2="42" stroke="#4a9eff" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- === NODE 1: Licence === -->
  <g class="dot l02">
    <circle cx="80" cy="90" r="7" fill="#0a1e3d" stroke="#4a9eff" stroke-width="2"/>
    <circle cx="80" cy="90" r="3" fill="#4a9eff"/>
  </g>
  <g class="line l02">
    <text x="105" y="85" font-family="Georgia, serif" font-size="10" fill="#4a6fa5" letter-spacing="1">2020 — 2023</text>
    <text x="105" y="101" font-family="Georgia, serif" font-size="13" fill="#ffffff" font-weight="bold">Licence Informatique</text>
    <text x="105" y="116" font-family="Georgia, serif" font-size="11" fill="#4a9eff88" font-style="italic">Université d'Angers · Développement · Réseaux</text>
  </g>

  <!-- connector dot -->
  <line class="line l03" x1="80" y1="97" x2="80" y2="155" stroke="#1e3a5a" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- === NODE 2: Master 1 === -->
  <g class="dot l03">
    <circle cx="80" cy="165" r="7" fill="#0a1e3d" stroke="#4a9eff" stroke-width="2"/>
    <circle cx="80" cy="165" r="3" fill="#4a9eff"/>
  </g>
  <g class="line l03">
    <text x="105" y="160" font-family="Georgia, serif" font-size="10" fill="#4a6fa5" letter-spacing="1">2023 — 2024</text>
    <text x="105" y="176" font-family="Georgia, serif" font-size="13" fill="#ffffff" font-weight="bold">Master 1 — Ingénierie du Logiciel</text>
    <text x="105" y="191" font-family="Georgia, serif" font-size="11" fill="#4a9eff88" font-style="italic">Université d'Avignon · Architecture logicielle</text>
  </g>

  <line class="line l04" x1="80" y1="172" x2="80" y2="232" stroke="#1e3a5a" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- === NODE 3: Master 2 === -->
  <g class="dot l04">
    <circle cx="80" cy="242" r="9" fill="#0a1e3d" stroke="#4a9eff" stroke-width="2.5"/>
    <circle cx="80" cy="242" r="4" fill="#4a9eff"/>
  </g>
  <g class="line l04">
    <text x="105" y="237" font-family="Georgia, serif" font-size="10" fill="#4a6fa5" letter-spacing="1">2024 — 2025</text>
    <text x="105" y="253" font-family="Georgia, serif" font-size="14" fill="#4a9eff" font-weight="bold">Master 2 — Cybersécurité</text>
    <text x="105" y="268" font-family="Georgia, serif" font-size="11" fill="#7ab8e8" font-style="italic">Université de Rennes 1 · Cyberschool</text>
  </g>

  <line class="line l05" x1="80" y1="251" x2="80" y2="311" stroke="#1e3a5a" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- === NODE 4: VW FS === -->
  <g class="dot l06">
    <circle cx="80" cy="321" r="9" fill="#0a2430" stroke="#0ea5a0" stroke-width="2.5"/>
    <circle cx="80" cy="321" r="4" fill="#0ea5a0"/>
  </g>
  <g class="line l06">
    <text x="105" y="316" font-family="Georgia, serif" font-size="10" fill="#4a6fa5" letter-spacing="1">Mars — Sept 2025</text>
    <text x="105" y="332" font-family="Georgia, serif" font-size="14" fill="#0ea5a0" font-weight="bold">Volkswagen Financial Services</text>
    <text x="105" y="347" font-family="Georgia, serif" font-size="11" fill="#5dd8d0" font-style="italic">Consultant Stagiaire Cybersécurité</text>
    <text x="105" y="362" font-family="Georgia, serif" font-size="10" fill="#0ea5a066">RGPD · TPRM · Registre de risques · AIPD</text>
  </g>

  <line class="line l07" x1="80" y1="330" x2="80" y2="390" stroke="#1e3a5a" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- === NODE 5: Aujourd'hui === -->
  <g class="dot l08">
    <circle cx="80" cy="400" r="10" fill="#050e1f" stroke="#febc2e" stroke-width="2.5"/>
    <circle cx="80" cy="400" r="4" fill="#febc2e" class="cursor"/>
  </g>
  <g class="line l08">
    <text x="105" y="395" font-family="Georgia, serif" font-size="10" fill="#febc2e" letter-spacing="2">MAINTENANT</text>
    <text x="105" y="411" font-family="Georgia, serif" font-size="13" fill="#ffffff" font-weight="bold">En recherche active — CDI</text>
    <text x="105" y="426" font-family="Georgia, serif" font-size="11" fill="#febc2e88" font-style="italic">GRC · SOC · Pentest · IDF / Remote</text>
  </g>

  <!-- Bottom separator + contact -->
  <g class="line l14">
    <line x1="40" y1="448" x2="660" y2="448" stroke="#1e3a5a" stroke-width="0.5"/>
    <text x="350" y="460" font-family="Georgia, serif" font-size="10" fill="#4a9eff55" text-anchor="middle" letter-spacing="2">juniorabakar07@gmail.com · Disponible immédiatement</text>
  </g>

</svg>
