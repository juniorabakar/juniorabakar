<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" width="700" height="480">
  <defs>
    <style>
      .line { opacity: 0; animation: appear 0.1s ease forwards; }
      .dot  { opacity: 0; animation: pop 0.4s cubic-bezier(.17,.67,.35,1.2) forwards; }
      .tag  { opacity: 0; animation: slideIn 0.4s ease forwards; }
      .pulse { animation: glow 2.5s ease-in-out infinite; }

      .l01 { animation-delay: 0.4s; }
      .l02 { animation-delay: 1.0s; }
      .l03 { animation-delay: 1.6s; }
      .l04 { animation-delay: 2.2s; }
      .l05 { animation-delay: 2.8s; }
      .l06 { animation-delay: 3.6s; }
      .l07 { animation-delay: 4.2s; }
      .l08 { animation-delay: 4.8s; }
      .l09 { animation-delay: 5.6s; }
      .l10 { animation-delay: 6.2s; }
      .l11 { animation-delay: 6.8s; }
      .l12 { animation-delay: 7.6s; }

      @keyframes appear  { to { opacity: 1; } }
      @keyframes pop {
        0%   { opacity: 0; transform: scale(0.3); }
        80%  { transform: scale(1.15); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes slideIn {
        0%   { opacity: 0; transform: translateX(-8px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      @keyframes glow {
        0%, 100% { opacity: 0.6; }
        50%       { opacity: 1; }
      }
    </style>

    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#04080f"/>
      <stop offset="100%" style="stop-color:#070d1a"/>
    </linearGradient>

    <!-- Certification badge gradient -->
    <linearGradient id="cert_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#1a3a5a"/>
      <stop offset="100%" style="stop-color:#0a2030"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="480" rx="12" fill="url(#bg3)" stroke="#0d1e30" stroke-width="1.5"/>

  <!-- Subtle horizontal rule top -->
  <line class="line l01" x1="40" y1="52" x2="660" y2="52" stroke="#4a9eff" stroke-width="0.4" opacity="0.3"/>

  <!-- HEADER -->
  <g class="line l01">
    <text x="350" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
          fill="#4a9eff" text-anchor="middle" letter-spacing="5" opacity="0.7">PARCOURS STRATÉGIQUE</text>
    <text x="350" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#1e3a5a" text-anchor="middle" letter-spacing="3">GOUVERNANCE · RISQUES · CONFORMITÉ</text>
  </g>

  <!-- ── VERTICAL SPINE ── -->
  <line class="line l01" x1="100" y1="65" x2="100" y2="430"
        stroke="#0d2035" stroke-width="2"/>

  <!-- ════════════════════════════════
       NODE 1 — Fondations IT
       ════════════════════════════════ -->
  <g class="dot l02">
    <circle cx="100" cy="90" r="8" fill="#0a1e3d" stroke="#4a9eff" stroke-width="1.5"/>
    <circle cx="100" cy="90" r="3" fill="#4a9eff"/>
  </g>
  <g class="line l02">
    <!-- Year pill -->
    <rect x="116" y="80" width="74" height="18" rx="9"
          fill="#0a1628" stroke="#4a9eff" stroke-width="0.8" opacity="0.7"/>
    <text x="153" y="93" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#4a9eff" text-anchor="middle" letter-spacing="1">2020 — 2023</text>

    <text x="200" y="93" font-family="'Segoe UI', Arial, sans-serif" font-size="13"
          fill="#e8f0fe" font-weight="600">  Fondations informatiques</text>
    <text x="116" y="110" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
          fill="#4a6fa5" font-style="italic">Licence MPCIE · Université d'Angers</text>
    <text x="116" y="124" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#1e3a5a">Réseaux · Systèmes · Développement logiciel</text>
  </g>

  <!-- connector -->
  <line class="line l03" x1="100" y1="100" x2="100" y2="155"
        stroke="#0d2035" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- ════════════════════════════════
       NODE 2 — Architecture & Systèmes
       ════════════════════════════════ -->
  <g class="dot l03">
    <circle cx="100" cy="163" r="8" fill="#0a1e3d" stroke="#4a9eff" stroke-width="1.5"/>
    <circle cx="100" cy="163" r="3" fill="#4a9eff"/>
  </g>
  <g class="line l03">
    <rect x="116" y="153" width="74" height="18" rx="9"
          fill="#0a1628" stroke="#4a9eff" stroke-width="0.8" opacity="0.7"/>
    <text x="153" y="166" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#4a9eff" text-anchor="middle" letter-spacing="1">2023 — 2024</text>

    <text x="200" y="166" font-family="'Segoe UI', Arial, sans-serif" font-size="13"
          fill="#e8f0fe" font-weight="600">  Ingénierie logicielle</text>
    <text x="116" y="183" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
          fill="#4a6fa5" font-style="italic">Master 1 · Université d'Avignon</text>
    <text x="116" y="197" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#1e3a5a">Architecture logicielle · Systèmes d'information</text>
  </g>

  <line class="line l04" x1="100" y1="173" x2="100" y2="232"
        stroke="#0d2035" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- ════════════════════════════════
       NODE 3 — Spécialisation Cyber + Certifs
       ════════════════════════════════ -->
  <g class="dot l04">
    <circle cx="100" cy="242" r="10" fill="#0d2040" stroke="#4a9eff" stroke-width="2"/>
    <circle cx="100" cy="242" r="4"  fill="#4a9eff"/>
  </g>
  <g class="line l04">
    <rect x="116" y="230" width="74" height="18" rx="9"
          fill="#0a1628" stroke="#4a9eff" stroke-width="1" opacity="0.9"/>
    <text x="153" y="243" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#4a9eff" text-anchor="middle" letter-spacing="1">2024 — 2025</text>

    <text x="200" y="243" font-family="'Segoe UI', Arial, sans-serif" font-size="14"
          fill="#4a9eff" font-weight="700">  Master 2 Cybersécurité</text>
    <text x="116" y="260" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
          fill="#7ab8e8" font-style="italic">Université de Rennes 1 — Cyberschool</text>
    <text x="116" y="274" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#1e3a5a">Sécurité des systèmes · GRC · Audit</text>
  </g>

  <!-- Certification tags -->
  <g class="tag l05">
    <rect x="116" y="282" width="120" height="20" rx="4"
          fill="url(#cert_grad)" stroke="#4a9eff" stroke-width="0.8"/>
    <text x="176" y="296" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#7ab8e8" text-anchor="middle" letter-spacing="0.5">CompTIA Security+</text>
  </g>
  <g class="tag l06">
    <rect x="244" y="282" width="138" height="20" rx="4"
          fill="url(#cert_grad)" stroke="#4a9eff" stroke-width="0.8"/>
    <text x="313" y="296" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#7ab8e8" text-anchor="middle" letter-spacing="0.5">ISO 27001 Lead Auditor</text>
  </g>
  <g class="tag l07">
    <rect x="390" y="282" width="100" height="20" rx="4"
          fill="url(#cert_grad)" stroke="#4a9eff" stroke-width="0.8"/>
    <text x="440" y="296" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#7ab8e8" text-anchor="middle" letter-spacing="0.5">GRC Mastery</text>
  </g>

  <line class="line l07" x1="100" y1="254" x2="100" y2="326"
        stroke="#0d2035" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- ════════════════════════════════
       NODE 4 — VW FS (expérience terrain)
       ════════════════════════════════ -->
  <g class="dot l07">
    <circle cx="100" cy="336" r="11" fill="#0a2430" stroke="#0ea5a0" stroke-width="2.5"/>
    <circle cx="100" cy="336" r="4"  fill="#0ea5a0"/>
  </g>
  <g class="line l07">
    <rect x="116" y="324" width="92" height="18" rx="9"
          fill="#0a2430" stroke="#0ea5a0" stroke-width="0.8" opacity="0.9"/>
    <text x="162" y="337" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#0ea5a0" text-anchor="middle" letter-spacing="1">Mars — Sept 2025</text>

    <text x="218" y="337" font-family="'Segoe UI', Arial, sans-serif" font-size="14"
          fill="#0ea5a0" font-weight="700">  Volkswagen Financial Services</text>
    <text x="116" y="354" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
          fill="#5dd8d0" font-style="italic">Consultant Stagiaire — Conformité RGPD &amp; Risques SI</text>
  </g>

  <!-- GRC pillars -->
  <g class="tag l08">
    <rect x="116" y="362" width="64" height="20" rx="4"
          fill="#0a2430" stroke="#0ea5a0" stroke-width="0.8"/>
    <text x="148" y="376" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#5dd8d0" text-anchor="middle">RGPD</text>
  </g>
  <g class="tag l08">
    <rect x="188" y="362" width="54" height="20" rx="4"
          fill="#0a2430" stroke="#0ea5a0" stroke-width="0.8"/>
    <text x="215" y="376" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#5dd8d0" text-anchor="middle">TPRM</text>
  </g>
  <g class="tag l09">
    <rect x="250" y="362" width="104" height="20" rx="4"
          fill="#0a2430" stroke="#0ea5a0" stroke-width="0.8"/>
    <text x="302" y="376" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#5dd8d0" text-anchor="middle">Registre de risques</text>
  </g>
  <g class="tag l09">
    <rect x="362" y="362" width="44" height="20" rx="4"
          fill="#0a2430" stroke="#0ea5a0" stroke-width="0.8"/>
    <text x="384" y="376" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#5dd8d0" text-anchor="middle">AIPD</text>
  </g>
  <g class="tag l10">
    <rect x="414" y="362" width="106" height="20" rx="4"
          fill="#0a2430" stroke="#0ea5a0" stroke-width="0.8"/>
    <text x="467" y="376" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#5dd8d0" text-anchor="middle">DPO · RSSI · Métiers</text>
  </g>

  <line class="line l10" x1="100" y1="347" x2="100" y2="415"
        stroke="#0d2035" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- ════════════════════════════════
       NODE 5 — Objectif (pulsing)
       ════════════════════════════════ -->
  <g class="dot l11">
    <circle cx="100" cy="423" r="12" fill="#050e1f" stroke="#e8a030" stroke-width="2.5" class="pulse"/>
    <circle cx="100" cy="423" r="5"  fill="#e8a030" class="pulse"/>
  </g>
  <g class="line l11">
    <rect x="116" y="411" width="74" height="18" rx="9"
          fill="#1a1000" stroke="#e8a030" stroke-width="0.8" opacity="0.9"/>
    <text x="153" y="424" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#e8a030" text-anchor="middle" letter-spacing="1">MAINTENANT</text>

    <text x="200" y="424" font-family="'Segoe UI', Arial, sans-serif" font-size="14"
          fill="#ffffff" font-weight="700">  Recherche active — CDI</text>
    <text x="116" y="441" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
          fill="#e8a03088" font-style="italic">Consultant · Auditeur · Ingénieur GRC</text>
    <text x="116" y="455" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#1e3a5a">Île-de-France · Télétravail · Disponible immédiatement</text>
  </g>

  <!-- Bottom line -->
  <g class="line l12">
    <line x1="40" y1="470" x2="660" y2="470" stroke="#0d1e30" stroke-width="0.5"/>
    <text x="350" y="480" font-family="'Segoe UI', Arial, sans-serif" font-size="9"
          fill="#1e3a5a" text-anchor="middle" letter-spacing="2">juniorabakar07@gmail.com</text>
  </g>

</svg>
