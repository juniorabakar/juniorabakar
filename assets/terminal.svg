  </g>

  <!-- Line 7: separator -->
  <g class="line l07">
    <text x="20" y="194" font-family="'Fira Code', monospace" font-size="11" fill="#1e3a5a">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
  </g>

