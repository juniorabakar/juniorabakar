<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420">
  <defs>
    <style>
      .line { opacity: 0; animation: appear 0.1s ease forwards; }
      .cursor { animation: blink 1s step-end infinite; }

      .l01 { animation-delay: 0.5s; }
      .l02 { animation-delay: 1.2s; }
      .l03 { animation-delay: 1.9s; }
      .l04 { animation-delay: 2.4s; }
      .l05 { animation-delay: 2.9s; }
      .l06 { animation-delay: 3.6s; }
      .l07 { animation-delay: 4.1s; }
      .l08 { animation-delay: 4.6s; }
      .l09 { animation-delay: 5.1s; }
      .l10 { animation-delay: 5.8s; }
      .l11 { animation-delay: 6.3s; }
      .l12 { animation-delay: 6.8s; }
      .l13 { animation-delay: 7.3s; }
      .l14 { animation-delay: 8.0s; }
      .l15 { animation-delay: 8.5s; }
      .l16 { animation-delay: 9.0s; }
      .l17 { animation-delay: 9.5s; }
      .l18 { animation-delay: 10.2s; }
      .l19 { animation-delay: 10.7s; }

      @keyframes appear {
        to { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>

    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#090d13"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect width="700" height="420" rx="10" fill="url(#bg)" stroke="#1e2a3a" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect width="700" height="36" rx="10" fill="#161b22"/>
  <rect y="26" width="700" height="10" fill="#161b22"/>

  <!-- Window buttons -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>

  <!-- Terminal title -->
  <text x="350" y="23" font-family="'Fira Code', monospace" font-size="12" fill="#4a9eff" text-anchor="middle" opacity="0.7">junior@abakar: ~/parcours</text>

  <!-- Terminal content starts at y=60, each line 22px -->

  <!-- Line 1: command -->
  <g class="line l01">
    <text x="20" y="68" font-family="'Fira Code', monospace" font-size="12" fill="#4a9eff">junior@abakar</text>
    <text x="145" y="68" font-family="'Fira Code', monospace" font-size="12" fill="#ffffff">:</text>
    <text x="153" y="68" font-family="'Fira Code', monospace" font-size="12" fill="#0ea5a0">~/parcours</text>
    <text x="246" y="68" font-family="'Fira Code', monospace" font-size="12" fill="#ffffff">$ cat career.log</text>
  </g>

  <!-- Line 2: separator -->
