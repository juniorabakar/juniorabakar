    <text x="20" y="420" font-family="'Fira Code', monospace" font-size="12" fill="#4a9eff">junior@abakar</text>
    <text x="145" y="420" font-family="'Fira Code', monospace" font-size="12" fill="#ffffff">:</text>
    <text x="153" y="420" font-family="'Fira Code', monospace" font-size="12" fill="#0ea5a0">~/parcours</text>
    <text x="246" y="420" font-family="'Fira Code', monospace" font-size="12" fill="#ffffff">$ </text>
    <rect class="line l19 cursor" x="270" y="408" width="8" height="14" fill="#4a9eff"/>
  </g>

</svg>
