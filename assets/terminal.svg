    <text x="95" y="360" font-family="'Fira Code', monospace" font-size="11" fill="#28c840">          GRC · SOC · Pentest</text>
    <text x="340" y="360" font-family="'Fira Code', monospace" font-size="11" fill="#4a9eff88">  · IDF / Remote</text>
