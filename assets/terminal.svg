    <text x="20" y="90" font-family="'Fira Code', monospace" font-size="11" fill="#1e3a5a">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
  </g>

